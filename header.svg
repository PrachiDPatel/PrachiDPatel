<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <style>
      .star { animation: tw var(--d, 3s) ease-in-out infinite alternate; }
      @keyframes tw { from { opacity: var(--lo, 0.1); } to { opacity: var(--hi, 0.9); } }

      .sh1 { opacity: 0; animation: s1 9s linear 0.5s infinite; }
      .sh2 { opacity: 0; animation: s2 13s linear 4s infinite; }
      .sh3 { opacity: 0; animation: s3 8s linear 6.5s infinite; }
      .sh4 { opacity: 0; animation: s4 11s linear 2s infinite; }

      @keyframes s1 {
        0%   { opacity: 0; transform: translate(0,0); }
        4%   { opacity: 0.9; }
        18%  { opacity: 0; transform: translate(220px, 110px); }
        100% { opacity: 0; transform: translate(220px, 110px); }
      }
      @keyframes s2 {
        0%   { opacity: 0; transform: translate(0,0); }
        3%   { opacity: 0.85; }
        15%  { opacity: 0; transform: translate(175px, 88px); }
        100% { opacity: 0; transform: translate(175px, 88px); }
      }
      @keyframes s3 {
        0%   { opacity: 0; transform: translate(0,0); }
        4%   { opacity: 0.9; }
        20%  { opacity: 0; transform: translate(240px, 120px); }
        100% { opacity: 0; transform: translate(240px, 120px); }
      }
      @keyframes s4 {
        0%   { opacity: 0; transform: translate(0,0); }
        3%   { opacity: 0.8; }
        16%  { opacity: 0; transform: translate(195px, 98px); }
        100% { opacity: 0; transform: translate(195px, 98px); }
      }
    </style>

    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#06040f"/>
      <stop offset="45%"  stop-color="#0d0a20"/>
      <stop offset="100%" stop-color="#06040f"/>
    </linearGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="72%">
      <stop offset="55%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
    </radialGradient>
  </defs>

  <rect width="860" height="220" fill="url(#bg)"/>
  <rect width="860" height="220" fill="url(#vig)"/>

  <!-- ── Stars ── -->
  <!-- top row -->
  <circle class="star" style="--d:2.3s;--lo:0.1;--hi:0.75" cx="23"  cy="12"  r="0.8" fill="#c8b4ff"/>
  <circle class="star" style="--d:3.5s;--lo:0.05;--hi:0.6" cx="78"  cy="8"   r="0.6" fill="white"/>
  <circle class="star" style="--d:2.8s;--lo:0.15;--hi:0.9" cx="145" cy="22"  r="1.2" fill="white"/>
  <circle class="star" style="--d:3.1s;--lo:0.1;--hi:0.65" cx="210" cy="15"  r="0.7" fill="#d4c4ff"/>
  <circle class="star" style="--d:2.5s;--lo:0.2;--hi:0.85" cx="290" cy="5"   r="1.0" fill="white"/>
  <circle class="star" style="--d:3.8s;--lo:0.05;--hi:0.7" cx="340" cy="30"  r="0.7" fill="#e0d7ff"/>
  <circle class="star" style="--d:2.1s;--lo:0.15;--hi:0.8" cx="420" cy="18"  r="0.9" fill="white"/>
  <circle class="star" style="--d:3.3s;--lo:0.1;--hi:0.6"  cx="480" cy="9"   r="0.6" fill="#c8b4ff"/>
  <circle class="star" style="--d:2.6s;--lo:0.2;--hi:0.85" cx="550" cy="25"  r="1.1" fill="white"/>
  <circle class="star" style="--d:3.7s;--lo:0.05;--hi:0.65" cx="620" cy="12" r="0.7" fill="#d4c4ff"/>
  <circle class="star" style="--d:2.9s;--lo:0.15;--hi:0.8" cx="690" cy="35"  r="1.0" fill="white"/>
  <circle class="star" style="--d:3.2s;--lo:0.1;--hi:0.75" cx="750" cy="8"   r="0.8" fill="white"/>
  <circle class="star" style="--d:2.7s;--lo:0.2;--hi:0.9"  cx="810" cy="20"  r="0.9" fill="#e0d7ff"/>
  <circle class="star" style="--d:3.4s;--lo:0.1;--hi:0.7"  cx="840" cy="38"  r="0.7" fill="white"/>

  <!-- upper-mid -->
  <circle class="star" style="--d:2.1s;--lo:0.1;--hi:0.65" cx="15"  cy="55"  r="0.6" fill="white"/>
  <circle class="star" style="--d:3.0s;--lo:0.15;--hi:0.85" cx="90" cy="68"  r="1.2" fill="#c8b4ff"/>
  <circle class="star" style="--d:2.5s;--lo:0.1;--hi:0.7"  cx="160" cy="47"  r="0.8" fill="white"/>
  <circle class="star" style="--d:3.6s;--lo:0.05;--hi:0.6" cx="230" cy="72"  r="0.7" fill="white"/>
  <circle class="star" style="--d:3.9s;--lo:0.1;--hi:0.75" cx="375" cy="45"  r="0.9" fill="white"/>
  <circle class="star" style="--d:2.4s;--lo:0.15;--hi:0.8" cx="450" cy="70"  r="0.7" fill="#d4c4ff"/>
  <circle class="star" style="--d:3.5s;--lo:0.1;--hi:0.7"  cx="660" cy="48"  r="0.8" fill="#c8b4ff"/>
  <circle class="star" style="--d:2.0s;--lo:0.15;--hi:0.9" cx="720" cy="73"  r="1.2" fill="white"/>
  <circle class="star" style="--d:3.3s;--lo:0.05;--hi:0.6" cx="780" cy="60"  r="0.7" fill="white"/>
  <circle class="star" style="--d:2.7s;--lo:0.1;--hi:0.75" cx="835" cy="50"  r="0.9" fill="#e0d7ff"/>
  <circle class="star" style="--d:3.8s;--lo:0.2;--hi:0.8"  cx="855" cy="72"  r="0.6" fill="white"/>

  <!-- middle — sides only, text center avoided -->
  <circle class="star" style="--d:2.4s;--lo:0.1;--hi:0.7"  cx="35"  cy="100" r="0.7" fill="#c8b4ff"/>
  <circle class="star" style="--d:3.2s;--lo:0.15;--hi:0.8" cx="115" cy="115" r="1.0" fill="white"/>
  <circle class="star" style="--d:2.9s;--lo:0.1;--hi:0.65" cx="185" cy="95"  r="0.8" fill="white"/>
  <circle class="star" style="--d:3.7s;--lo:0.05;--hi:0.55" cx="720" cy="105" r="0.9" fill="#d4c4ff"/>
  <circle class="star" style="--d:2.3s;--lo:0.2;--hi:0.85" cx="790" cy="120" r="0.7" fill="white"/>
  <circle class="star" style="--d:3.0s;--lo:0.1;--hi:0.7"  cx="845" cy="100" r="1.1" fill="white"/>

  <!-- lower-mid -->
  <circle class="star" style="--d:2.6s;--lo:0.15;--hi:0.8" cx="30"  cy="150" r="0.8" fill="white"/>
  <circle class="star" style="--d:3.5s;--lo:0.05;--hi:0.65" cx="100" cy="165" r="0.6" fill="#e0d7ff"/>
  <circle class="star" style="--d:2.1s;--lo:0.2;--hi:0.9"  cx="170" cy="140" r="1.0" fill="white"/>
  <circle class="star" style="--d:3.8s;--lo:0.1;--hi:0.7"  cx="740" cy="155" r="0.7" fill="#c8b4ff"/>
  <circle class="star" style="--d:2.5s;--lo:0.15;--hi:0.8" cx="810" cy="140" r="0.9" fill="white"/>
  <circle class="star" style="--d:3.1s;--lo:0.05;--hi:0.6" cx="850" cy="165" r="0.8" fill="white"/>

  <!-- bottom row -->
  <circle class="star" style="--d:2.8s;--lo:0.1;--hi:0.75" cx="50"  cy="195" r="0.7" fill="white"/>
  <circle class="star" style="--d:3.4s;--lo:0.15;--hi:0.85" cx="130" cy="205" r="1.0" fill="#d4c4ff"/>
  <circle class="star" style="--d:2.2s;--lo:0.1;--hi:0.65" cx="200" cy="185" r="0.6" fill="white"/>
  <circle class="star" style="--d:3.6s;--lo:0.2;--hi:0.8"  cx="700" cy="195" r="0.8" fill="white"/>
  <circle class="star" style="--d:2.9s;--lo:0.05;--hi:0.7" cx="770" cy="210" r="0.7" fill="#e0d7ff"/>
  <circle class="star" style="--d:3.3s;--lo:0.15;--hi:0.9" cx="830" cy="185" r="1.1" fill="white"/>

  <!-- bright featured stars -->
  <circle class="star" style="--d:4.0s;--lo:0.3;--hi:1.0"  cx="60"  cy="40"  r="2.0" fill="#f0e8ff"/>
  <circle class="star" style="--d:3.5s;--lo:0.2;--hi:0.95" cx="800" cy="45"  r="1.8" fill="#e8d8ff"/>
  <circle class="star" style="--d:4.2s;--lo:0.25;--hi:1.0" cx="250" cy="55"  r="1.7" fill="white"/>
  <circle class="star" style="--d:3.8s;--lo:0.3;--hi:0.9"  cx="630" cy="60"  r="1.9" fill="#f0e8ff"/>
  <circle class="star" style="--d:4.5s;--lo:0.2;--hi:0.95" cx="55"  cy="165" r="1.6" fill="white"/>
  <circle class="star" style="--d:3.6s;--lo:0.25;--hi:1.0" cx="820" cy="165" r="1.8" fill="#e8d8ff"/>

  <!-- ── Shooting stars ── -->
  <!-- 1: upper-left -->
  <g class="sh1">
    <line x1="45" y1="20" x2="108" y2="50" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="108" cy="50" r="2.0" fill="white"/>
  </g>
  <!-- 2: upper right -->
  <g class="sh2">
    <line x1="590" y1="18" x2="648" y2="47" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="648" cy="47" r="1.8" fill="white"/>
  </g>
  <!-- 3: upper center-left -->
  <g class="sh3">
    <line x1="258" y1="12" x2="312" y2="39" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="312" cy="39" r="1.9" fill="white"/>
  </g>
  <!-- 4: upper right side -->
  <g class="sh4">
    <line x1="718" y1="28" x2="772" y2="55" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="772" cy="55" r="1.6" fill="white"/>
  </g>

  <!-- ── Text ── -->
  <text x="430" y="102"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="52"
        font-weight="600"
        fill="#e0d7ff"
        letter-spacing="-0.5">Prachi Patel</text>
  <text x="430" y="140"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif"
        font-size="17"
        fill="#a78bfa"
        letter-spacing="0.4">CS × Geology · curious about everything</text>
</svg>
